name: Build Aura OS ISO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu xorriso mtools wget tar

    - name: Build Kernel
      run: |
        # src フォルダ内の kernel.c を指定
        x86_64-linux-gnu-gcc -c src/kernel.c -o kernel.o -std=c11 -ffreestanding -fno-stack-protector -fno-stack-check -fno-lto -fno-pie -fno-pic -m64 -march=x86-64 -mno-80387 -mno-mmx -mno-sse -mno-sse2 -mno-red-zone -Isrc
        
        # config フォルダ内の linker.ld を使用
        x86_64-linux-gnu-ld -nostdlib -static -m elf_x86_64 -z max-page-size=0x1000 -T config/linker.ld kernel.o -o kernel.elf

    - name: Prepare ISO Root
      run: |
        mkdir -p iso_root
        # カーネルと設定ファイルを配置 (config/ フォルダの構造を維持) [cite: 10]
        cp kernel.elf config/limine.conf iso_root/
        
        # Limine アーカイブを固定の名前 'limine.tar.gz' で取得
        wget https://github.com/limine-bootloader/limine/archive/refs/heads/v7.x-binary.tar.gz -O limine.tar.gz
        
        # 作業用フォルダを作成し、中のフォルダ名を無視して（--strip-components=1）中身だけ展開
        mkdir limine_work
        tar -xf limine.tar.gz -C limine_work --strip-components=1
        
        # 必要なバイナリを iso_root に集約
        cp limine_work/limine-bios.sys iso_root/
        cp limine_work/limine-bios-cd.bin iso_root/
        cp limine_work/limine iso_root/
        
        # インストーラーに実行権限を付与
        chmod +x iso_root/limine

    - name: Create ISO
      run: |
        # xorriso で ISO を作成 [cite: 12]
        xorriso -as mkisofs -b limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                iso_root -o aura-os.iso
        
        # ISO にブートローダーをインストール [cite: 12]
        ./iso_root/limine bios-install aura-os.iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-os-iso
        path: aura-os.iso

    - name: Create ISO
      run: |
        # xorriso で ISO を作成 [cite: 12]
        xorriso -as mkisofs -b limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                iso_root -o aura-os.iso
        
        # ISO にブートローダーをインストール [cite: 12]
        ./iso_root/limine bios-install aura-os.iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-os-iso
        path: aura-os.iso

    - name: Create ISO
      run: |
        xorriso -as mkisofs -b limine-bios-cd.bin -no-emul-boot -boot-load-size 4 -boot-info-table iso_root -o aura-os.iso
        ./iso_root/limine bios-install aura-os.iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-os-iso
        path: aura-os.iso
