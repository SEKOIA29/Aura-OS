name: Build Aura OS

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu xorriso mtools wget

    - name: Build Kernel
      run: |
        # 標準のクロスコンパイラを使用
        # -ffreestanding を付けることで標準ライブラリを切り離し、OS自作用として機能させます
        x86_64-linux-gnu-gcc -c kernel.c -o kernel.o -std=c11 -ffreestanding -fno-stack-protector -fno-stack-check -fno-lto -fno-pie -fno-pic -m64 -march=x86-64 -mno-80387 -mno-mmx -mno-sse -mno-sse2 -mno-red-zone
        
        # リンク
        x86_64-linux-gnu-ld -nostdlib -static -m elf_x86_64 -z max-page-size=0x1000 -T linker.ld kernel.o -o kernel.elf

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-kernel
        path: kernel.elf
