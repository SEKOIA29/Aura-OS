name: Build Aura OS ISO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu xorriso mtools wget tar

    - name: Build Kernel
      run: |
        # カーネルのコンパイルとリンク
        x86_64-linux-gnu-gcc -c kernel.c -o kernel.o -std=c11 -ffreestanding -fno-stack-protector -fno-stack-check -fno-lto -fno-pie -fno-pic -m64 -march=x86-64 -mno-80387 -mno-mmx -mno-sse -mno-sse2 -mno-red-zone
        x86_64-linux-gnu-ld -nostdlib -static -m elf_x86_64 -z max-page-size=0x1000 -T linker.ld kernel.o -o kernel.elf

    - name: Prepare ISO Root
      run: |
        # ISOの元になるディレクトリ構造を作成
        mkdir -p iso_root
        cp kernel.elf limine.conf iso_root/
        
        # Limineの最新バイナリをダウンロードして配置
        # v7.x系統のバイナリリリースを使用
        wget https://github.com/limine-bootloader/limine/raw/v7.x-binary/limine-bios.sys
        wget https://github.com/limine-bootloader/limine/raw/v7.x-binary/limine-bios-cd.bin
        wget https://github.com/limine-bootloader/limine/raw/v7.x-binary/limine
        cp limine-bios.sys limine-bios-cd.bin limine iso_root/

    - name: Create ISO
      run: |
        # xorriso を使用して起動可能なISOを作成
        xorriso -as mkisofs -b limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                iso_root -o aura-os.iso
        
        # LimineをISOにインストール（BIOS起動用）
        ./limine bios-install aura-os.iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-os-iso
        path: aura-os.iso
