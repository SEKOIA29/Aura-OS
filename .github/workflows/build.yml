name: Build Aura OS ISO
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu \
          xorriso mtools wget tar gcc make
          
    - name: Build Kernel
      run: |
        # kernel.c と malloc.c の両方をコンパイル
        x86_64-linux-gnu-gcc -c src/kernel.c -o kernel.o (オプション略)
        x86_64-linux-gnu-gcc -c src/malloc.c -o malloc.o (オプション略)
        
        # 両方のオブジェクトファイルをリンクして elf を作成
        x86_64-linux-gnu-ld -nostdlib -static -m elf_x86_64 -T config/linker.ld kernel.o malloc.o -o kernel.elf

    - name: Prepare ISO Root
      run: |
        mkdir -p iso_root
        cp kernel.elf config/limine.conf iso_root/

        wget https://github.com/limine-bootloader/limine/archive/refs/heads/v7.x-binary.tar.gz -O limine.tar.gz
        mkdir limine_work
        tar -xf limine.tar.gz -C limine_work --strip-components=1

        # ホストツール（limine コマンド）をソースからビルド
        make -C limine_work

        # バイナリファイルをコピー
        cp limine_work/limine-bios.sys    iso_root/
        cp limine_work/limine-bios-cd.bin iso_root/

    - name: Create ISO
      run: |
        xorriso -as mkisofs -b limine-bios-cd.bin \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          iso_root -o aura-os.iso

        # ビルドした limine コマンドで BIOS インストール
        ./limine_work/limine bios-install aura-os.iso

 

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-os-iso
        path: aura-os.iso
